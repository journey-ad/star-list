name: Update awesome list

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 */1 * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Awesome generator
        uses: journey-ad/simonecorsi-mawesome@v2
        with:
          template-path: "template/README.ejs"
          api-token: ${{ secrets.API_TOKEN }}
          github-email: ${{ secrets.USER_EMAIL }}
          github-name: ${{ github.repository_owner }}
      - name: Generate emoji.json
        env:
          GH_TOKEN: ${{ secrets.API_TOKEN }}
        run: node scripts/gen-emojis.mjs
      - name: Commit emoji.json
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ secrets.USER_EMAIL }}"
          git add emoji.json
          git diff --staged --quiet || git commit -m "chore(emoji): update emoji map"
          git push
